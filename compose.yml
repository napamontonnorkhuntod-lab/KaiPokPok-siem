services:
  # ========================================================
  # 1. Zookeeper (ผู้จัดการระบบกระจายสาย)
  # ========================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: kaipokpok-zookeeper
    networks:
      - kaipokpok-net
    ports:
      - "22181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  # ========================================================
  # 2. Apache Kafka (ท่อส่งข้อมูลความเร็วสูง)
  # ========================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kaipokpok-kafka
    depends_on:
      - zookeeper
    networks:
      - kaipokpok-net
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ========================================================
  # 3. Wazuh Manager (สมองกลวิเคราะห์และตรวจจับการโจมตี)
  # ========================================================
  wazuh-manager:
    image: wazuh/wazuh-manager:4.14.5
    container_name: kaipokpok-wazuh-manager
    restart: always
    networks:
      - kaipokpok-net
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "55000:55000"
    volumes:
      - wazuh_manager_data:/var/ossec/data
      - ./siem-back/shared_logs:/var/ossec/logs/alerts
      - ./wazuh-manager/local_rules.xml:/var/ossec/etc/rules/local_rules.xml
      - ./victim_server/agent.conf:/var/ossec/etc/shared/default/agent.conf

  # ========================================================
  # 4. Filebeat (ตัวดูด Log ส่งเข้า Kafka)
  # ========================================================
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: kaipokpok-filebeat
    user: root
    command: [ "--strict.perms=false" ]
    depends_on:
      - kafka
      - wazuh-manager
    networks:
      - kaipokpok-net
    volumes:
      - ./siem-back/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./siem-back/shared_logs:/var/log/siem_logs

  # ========================================================
  # 5. Wazuh Agent (ตัวจำลองเครื่องปลายทางที่ถูกโจมตีจริง)
  # ========================================================
  wazuh-agent:
    image: wazuh/wazuh-agent:4.14.5
    container_name: kaipokpok-wazuh-agent
    restart: always
    user: root # ใช้สิทธิ์ root เพื่อให้สามารถอ่านไฟล์ล็อกได้อย่างไม่มีปัญหาเรื่องสิทธิ์
    depends_on:
      - wazuh-manager
    networks:
      - kaipokpok-net
    environment:
      - WAZUH_MANAGER_SERVER=kaipokpok-wazuh-manager # ระบุชื่อคอนเทนเนอร์เพื่อให้ Agent วิ่งไปลงทะเบียนอัตโนมัติ
    volumes:
      # แมปไฟล์สคริปต์ฉีดล็อก และไฟล์ชุดข้อมูลเข้ามาในตัว Agent
      - ./victim_server/logs:/var/log/app

  # ========================================================
  # 6. OpenSearch (Dashboard Database for SCA)
  # ========================================================
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: kaipokpok-opensearch
    environment:
      - cluster.name=kaipokpok-cluster
      - cluster.routing.allocation.disk.threshold_enabled=false
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - kaipokpok-net


  # ========================================================
  # 7. SIEM Router (Python Kafka Consumer + LLM Router)
  # ========================================================
  siem-router:
    build:
      context: ./siem-router
    container_name: kaipokpok-siem-router
    depends_on:
      - kafka
      - opensearch
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kaipokpok-net

# 🌐 กำหนดเน็ตเวิร์กและโวลุ่มแบบสั้นกระชับ (Modern Format)
networks:
  kaipokpok-net:
    driver: bridge

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  wazuh_manager_data:
  opensearch_data:
