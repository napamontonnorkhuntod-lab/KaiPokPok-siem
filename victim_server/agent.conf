<agent_config>

  <!-- ============================================================ -->
  <!-- Mixed Log File: live_stream.log contains:                   -->
  <!--   - Apache access log lines                                  -->
  <!--   - Cisco ASA syslog lines                                   -->
  <!--   - Windows Event JSON lines                                 -->
  <!--                                                              -->
  <!-- Use syslog format: Wazuh can decode ALL 3 types from        -->
  <!-- a single syslog entry because:                               -->
  <!--   1. Apache/Cisco lines get decoded by web-accesslog/cisco   -->
  <!--   2. JSON lines get auto-decoded by the json decoder         -->
  <!--      which runs inside analysisd regardless of log_format    -->
  <!-- ============================================================ -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/app/live_stream.log</location>
  </localfile>
  <!-- ============================================================ -->
  <!-- Disable SCA (Security Configuration Assessment)              -->
  <!-- Prevent excessive system scan logs on startup                -->
  <!-- ============================================================ -->
  <sca>
    <enabled>no</enabled>          <!-- ปิดโมดูลนี้ตามที่คอมเมนต์ระบุไว้ เพื่อลดภาระการทำงาน -->
    <scan_on_start>no</scan_on_start> <!-- ปิดการสแกนทันทีตอนเพิ่งเปิดเครื่อง ป้องกัน Log ทะลัก -->
    <interval>12h</interval>          <!-- ให้สแกนซ้ำเฉพาะตอนที่ครบ 12 ชั่วโมงเท่านั้น -->
  </sca>

</agent_config>
